version: 2

project_name: go-monorepo-test

# before:
#   hooks:
#     - go mod tidy
#     - go mod download

builds:
  - id: test
    dir: ./cmd/test
    binary: test
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.buildDate={{.Date}}
      - -X main.commit={{.Commit}}

archives:
  - id: default
    builds:
      - test
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

dockers_v2:
  - ids:
      - test
    image_templates:
      - "ghcr.io/wagoodman/{{ .ProjectName }}:{{ .Version }}"
      - "ghcr.io/wagoodman/{{ .ProjectName }}:latest"
    dockerfile: Dockerfile
    build_flag_templates:
      - "--pull"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source=https://github.com/wagoodman/go-monorepo-test"
      - "--platform=linux/amd64"
    extra_files:
      - LICENSE
  - ids:
      - test
    image_templates:
      - "ghcr.io/wagoodman/{{ .ProjectName }}:{{ .Version }}-arm64"
    dockerfile: Dockerfile
    build_flag_templates:
      - "--pull"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source=https://github.com/wagoodman/go-monorepo-test"
      - "--platform=linux/arm64"
    extra_files:
      - LICENSE
    goarch: arm64

docker_manifests:
  - name_template: "ghcr.io/wagoodman/{{ .ProjectName }}:{{ .Version }}"
    image_templates:
      - "ghcr.io/wagoodman/{{ .ProjectName }}:{{ .Version }}"
      - "ghcr.io/wagoodman/{{ .ProjectName }}:{{ .Version }}-arm64"
  - name_template: "ghcr.io/wagoodman/{{ .ProjectName }}:latest"
    image_templates:
      - "ghcr.io/wagoodman/{{ .ProjectName }}:{{ .Version }}"
      - "ghcr.io/wagoodman/{{ .ProjectName }}:{{ .Version }}-arm64"

release:
  github:
    owner: wagoodman
    name: go-monorepo-test
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}} v{{.Version}}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
